name: lms-ojt-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: lms-ojt-postgres
    environment:
      POSTGRES_DB: lms_ojt
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
    ports:
      - "5432:5432"
    volumes:
      - lms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_ojt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: lms-ojt-redis
    ports:
      - "6379:6379"
    volumes:
      - lms_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: lms-ojt-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - lms_mosquitto_data:/mosquitto/data
      - lms_mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  lms_postgres_data:
  lms_redis_data:
  lms_mosquitto_data:
  lms_mosquitto_log:
